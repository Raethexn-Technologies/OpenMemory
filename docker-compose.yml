version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: oma_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    env_file:
      - ./app/.env
    networks:
      - oma_network
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: oma_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - oma_network
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: oma_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-open_memory}
      POSTGRES_USER: ${DB_USERNAME:-oma_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - oma_pgdata:/var/lib/postgresql/data
    networks:
      - oma_network

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: oma_queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - ./app:/var/www/html
    env_file:
      - ./app/.env
    networks:
      - oma_network
    depends_on:
      - db
      - app

  # ICP memory adapter — required when ICP_MOCK_MODE=false
  # Bridges Laravel HTTP calls to the deployed Motoko canister via @dfinity/agent.
  # In mock mode this container still runs but uses its own in-memory store.
  icp-adapter:
    image: node:20-alpine
    container_name: oma_icp_adapter
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && node server.js"
    volumes:
      - ./icp/adapter:/app
    ports:
      - "3100:3100"
    environment:
      PORT: 3100
      ICP_MOCK: ${ICP_MOCK_MODE:-true}
      ICP_CANISTER_ID: ${ICP_CANISTER_ID:-}
      ICP_HOST: ${ICP_CANISTER_ENDPOINT:-http://localhost:4943}
    networks:
      - oma_network

networks:
  oma_network:
    driver: bridge

volumes:
  oma_pgdata:
    driver: local
