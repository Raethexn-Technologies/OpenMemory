version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: oma_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    env_file:
      - ./app/.env
    environment:
      # In Docker, the app talks to the adapter container by service name.
      # This overrides any ICP_CANISTER_ENDPOINT in .env.
      ICP_CANISTER_ENDPOINT: http://icp-adapter:3100
    networks:
      - oma_network
    depends_on:
      - db
      - icp-adapter

  nginx:
    image: nginx:alpine
    container_name: oma_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - oma_network
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: oma_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-open_memory}
      POSTGRES_USER: ${DB_USERNAME:-oma_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - oma_pgdata:/var/lib/postgresql/data
    networks:
      - oma_network

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: oma_queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - ./app:/var/www/html
    env_file:
      - ./app/.env
    networks:
      - oma_network
    depends_on:
      - db
      - app

  # ICP memory adapter — required when ICP_MOCK_MODE=false.
  # Translates the app's HTTP JSON calls into Candid calls against the ICP canister.
  # Also runs in mock mode (in-memory store) when ICP_MOCK_MODE=true.
  #
  # NOTE: ICP_DFX_HOST is the adapter→dfx URL, which is separate from
  # ICP_CANISTER_ENDPOINT (the app→adapter URL set above in the app service).
  icp-adapter:
    image: node:20-alpine
    container_name: oma_icp_adapter
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && node server.js"
    volumes:
      - ./icp/adapter:/app
    ports:
      - "3100:3100"
    environment:
      PORT: 3100
      ICP_MOCK: ${ICP_MOCK_MODE:-true}
      ICP_CANISTER_ID: ${ICP_CANISTER_ID:-}
      # ICP_DFX_HOST is where the adapter finds the dfx replica (or mainnet gateway).
      # Default points to local dfx. Override for mainnet: https://ic0.app
      ICP_DFX_HOST: ${ICP_DFX_HOST:-http://localhost:4943}
    networks:
      - oma_network

networks:
  oma_network:
    driver: bridge

volumes:
  oma_pgdata:
    driver: local
